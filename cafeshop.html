// ═══════════ HISTORY LOGGING ═══════════
async function logHistory(tableId, action) {
  try {
    const { collection, addDoc, serverTimestamp } = window._firebase;
    await addDoc(collection(window._db,'actlog'), {
      tableId, tableNum: tableId.replace('t',''),
      action, by: currentUser?.email||'system',
      byName: displayName(currentUser?.email||'system'),
      at: serverTimestamp()
    });
  } catch(e){
    console.error('logHistory error:', e);
    // Không toast để không làm phiền user, nhưng log ra console để debug
  }
}

// ═══════════ HISTORY PAGE ═══════════
async function renderHistory() {
  document.getElementById('main').innerHTML = `
    <div class="ph">
      <div><h2 class="ph-title">📋 Lịch sử</h2></div>
    </div>
    <div class="filter-bar">
      <div class="field" style="margin:0;min-width:120px"><label>Bàn</label>
        <select class="inp inp-sm" id="flt-table">
          <option value="">Tất cả</option>
          ${Array.from({length:shopConfig.tableCount||20},(_,i)=>`<option value="t${i+1}">Bàn ${i+1}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin:0"><label>Từ ngày</label><input class="inp inp-sm" type="date" id="flt-from"></div>
      <div class="field" style="margin:0"><label>Đến ngày</label><input class="inp inp-sm" type="date" id="flt-to"></div>
      <div class="field" style="margin:0"><label>Loại</label>
        <select class="inp inp-sm" id="flt-type">
          <option value="">Tất cả</option>
          <option value="checkout">Thanh toán</option>
          <option value="action">Hành động</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end">
        <button class="btn btn-gold btn-sm" onclick="loadHistory()">🔍 Lọc</button>
        <button class="btn btn-outline btn-sm" onclick="clearFilter()">✕ Xoá lọc</button>
        <button class="btn btn-red btn-sm" onclick="confirmClearHistory()">🗑 Xoá tất cả</button>
      </div>
    </div>
    <div id="hist-area"><div class="spinner"></div></div>`;
  loadHistory();
}

async function loadHistory() {
  const { collection, getDocs, query, orderBy, where, Timestamp } = window._firebase;
  const tblFlt = document.getElementById('flt-table')?.value||'';
  const typeFlt = document.getElementById('flt-type')?.value||'';
  const fromDate = document.getElementById('flt-from')?.value;
  const toDate = document.getElementById('flt-to')?.value;
  const area = document.getElementById('hist-area');
  if (!area) return;
  area.innerHTML = '<div class="spinner"></div>';

  try {
    // Load checkout history
    let checkoutDocs = [], actlogDocs = [];
    if (!typeFlt || typeFlt==='checkout') {
      let q = query(collection(window._db,'history'), orderBy('closedAt','desc'));
      const snap = await getDocs(q);
      checkoutDocs = snap.docs.map(d=>({id:d.id,...d.data(), _type:'checkout'}));
    }
    if (!typeFlt || typeFlt==='action') {
      let q = query(collection(window._db,'actlog'), orderBy('at','desc'));
      const snap = await getDocs(q);
      actlogDocs = snap.docs.map(d=>({id:d.id,...d.data(), _type:'action'}));
    }

    let all = [...checkoutDocs, ...actlogDocs];

    // Filter
    if (tblFlt) all = all.filter(d=>d.tableId===tblFlt);
    if (fromDate) {
      const from = new Date(fromDate);
      all = all.filter(d=>{
        const ts = d.closedAt||d.at;
        if (!ts) return true;
        const dt = ts.toDate?ts.toDate():new Date(ts);
        return dt >= from;
      });
    }
    if (toDate) {
      const to = new Date(toDate); to.setHours(23,59,59);
      all = all.filter(d=>{
        const ts = d.closedAt||d.at;
        if (!ts) return true;
        const dt = ts.toDate?ts.toDate():new Date(ts);
        return dt <= to;
      });
    }

    if (!all.length) { area.innerHTML='<div class="empty">Không có dữ liệu</div>'; return; }

    // Group by tableId + date
    const grouped = {};
    all.forEach(d=>{
      const ts = d.closedAt||d.at;
      const dt = ts?.toDate?ts.toDate():ts?new Date(ts):new Date();
      const dateStr = dt.toLocaleDateString('vi-VN');
      const key = `${d.tableId||'?'}_${dateStr}`;
      if (!grouped[key]) grouped[key] = {tableId:d.tableId,tableNum:d.tableNum||(d.tableId||'').replace('t',''),date:dateStr,items:[]};
      grouped[key].items.push(d);
    });

    area.innerHTML = Object.entries(grouped).map(([key,g])=>`
      <div class="hist-item">
        <div class="hist-head" onclick="toggleFolder('hb-${key.replace(/[^a-z0-9]/gi,'_')}',this)">
          <div>
            <span style="font-weight:700">🪑 Bàn ${g.tableNum||'?'}</span>
            <span style="color:var(--text3);font-size:12px;margin-left:8px">${g.date}</span>
            <span class="badge" style="background:var(--accent);color:#1a1000">${g.items.length}</span>
          </div>
          <span style="color:var(--text3);font-size:18px" id="fa-hb-${key.replace(/[^a-z0-9]/gi,'_')}">▶</span>
        </div>
        <div class="hist-body" id="hb-${key.replace(/[^a-z0-9]/gi,'_')}">
          ${g.items.map(d=>{
            if (d._type==='checkout') {
              const merged = mergeOrderItems(d.items||[]);
              return `<div style="background:var(--surface);border-radius:7px;padding:10px;margin:8px 0;border:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px">
                  <span>💳 Thanh toán bởi <strong>${displayName(d.closedBy||'')}</strong></span>
                  <span>${fmtDate(d.closedAt)}</span>
                </div>
                ${merged.map(it=>`<div class="hist-item-row">
                  <span>${it.name}${it.size?' ('+it.size+')':''} ×${it.qty}</span>
                  <span style="color:var(--accent)">${fmtMoney(it.price*it.qty)}</span>
                </div>`).join('')}
                <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
                  <span>Tổng</span><span style="color:var(--accent2)">${fmtMoney(d.total)}</span>
                </div>
              </div>`;
            } else {
              const by = d.byName || displayName(d.by||'') || '?';
              return `<div class="hist-log">• ${fmtDate(d.at)} — ${d.action} <strong style="color:var(--accent)">(bởi ${by})</strong></div>`;
            }
          }).join('')}
        </div>
      </div>`).join('');
  } catch(e) { area.innerHTML=`<div class="empty">Lỗi tải dữ liệu: ${e.message}</div>`; }
}

function clearFilter() {
  document.getElementById('flt-table').value='';
  document.getElementById('flt-from').value='';
  document.getElementById('flt-to').value='';
  document.getElementById('flt-type').value='';
  loadHistory();
}

async function confirmClearHistory() {
  if (!confirm('XOÁ TOÀN BỘ lịch sử? Hành động này không thể hoàn tác!')) return;
  if (!confirm('Xác nhận lần 2: Bạn thực sự muốn xoá tất cả lịch sử?')) return;
  toast('Đang xoá... vui lòng chờ','info');
  const { collection, getDocs, doc, deleteDoc } = window._firebase;
  const [hs, al] = await Promise.all([getDocs(collection(window._db,'history')), getDocs(collection(window._db,'actlog'))]);
  const all = [...hs.docs.map(d=>deleteDoc(doc(window._db,'history',d.id))), ...al.docs.map(d=>deleteDoc(doc(window._db,'actlog',d.id)))];
  await Promise.all(all);
  toast('Đã xoá toàn bộ lịch sử','ok');
  loadHistory();
}
</script>
