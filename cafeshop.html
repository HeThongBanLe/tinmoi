<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #c9a84c;
  --accent2: #e8c96a;
  --bg: #0f0d0b;
  --surface: #1a1714;
  --surface2: #231f1b;
  --surface3: #2e2924;
  --border: #3a332c;
  --cream: #f5ead8;
  --text: #f0e6d3;
  --text2: #b0a090;
  --text3: #6b5f52;
  --red: #e05a4e;
  --green: #5aab7a;
  --blue: #5a8fc9;
  --r: 12px;
  --sh: 0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TOAST */
#toast-wrap{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:4px solid var(--accent);padding:10px 14px;border-radius:8px;font-size:13px;max-width:300px;animation:tslide .3s ease;pointer-events:auto}
.toast.err{border-left-color:var(--red)}.toast.ok{border-left-color:var(--green)}.toast.info{border-left-color:var(--blue)}
@keyframes tslide{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* NOTIFICATION CORNER */
#notif-wrap{position:fixed;bottom:70px;left:16px;z-index:9998;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.notif{background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:10px 14px;font-size:13px;max-width:260px;animation:tslide .3s ease;box-shadow:var(--sh)}
.notif .notif-title{font-weight:700;color:var(--accent);font-size:12px;margin-bottom:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-full{width:100%}
.btn-gold{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1000}
.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.1)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{filter:brightness(1.1)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-icon{width:32px;height:32px;padding:0;border-radius:6px}

/* INPUTS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 10px;font-size:13px}
select.inp option{background:var(--surface2)}
.input-row{display:flex;gap:8px}
.input-row .field{flex:1}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#2a1f0e,#0f0d0b)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:360px;box-shadow:var(--sh)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:30px;color:var(--accent)}
.login-logo p{font-size:11px;color:var(--text3);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.login-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.login-or{text-align:center;color:var(--text3);font-size:12px;margin:14px 0;position:relative}
.login-or::before,.login-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.login-or::before{left:0}.login-or::after{right:0}

/* GUEST PAGE */
#guest-screen{min-height:100vh;display:none}
.guest-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.guest-header h2{font-size:20px;color:var(--accent);flex:1}
.guest-body{padding:20px}
.guest-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--text2)}
.guest-tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.guest-table{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s}
.guest-table:hover{border-color:var(--accent);transform:translateY(-2px)}
.guest-table.occupied{border-color:var(--green);background:#0a1f12}
.guest-table .tnum{font-size:24px;font-weight:700;color:var(--text);font-family:'Playfair Display',serif}
.guest-table .tstatus{font-size:11px;color:var(--text3);margin-top:3px}

/* APP LAYOUT */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:20px;color:var(--accent)}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;color:var(--text2);transition:all .2s;border-left:3px solid transparent;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:17px;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b6914);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a1000;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px}
.logout-btn:hover{color:var(--red)}
.main{margin-left:220px;padding:22px;min-height:100vh;transition:margin .3s}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:20px}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}

/* PAGE */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:24px;color:var(--cream)}
.ph-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title-left{display:flex;align-items:center;gap:8px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* TAGS */
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-gold{background:#2a2010;color:var(--accent);border:1px solid #4a3a18}
.tag-green{background:#0f2a1a;color:var(--green);border:1px solid #1a4a2a}
.tag-blue{background:#0f1e2a;color:var(--blue);border:1px solid #1a304a}
.tag-red{background:#2a0f0e;color:var(--red);border:1px solid #4a1e1a}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh)}
.modal-lg{max-width:680px}
.modal-title{font-size:18px;color:var(--cream);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px}
.modal-close:hover{color:var(--red)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .2s}
.tab.active{background:var(--accent);color:#1a1000;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* COLOR PICKER */
.color-swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.swatch.active{border-color:var(--text);transform:scale(1.15)}
.theme-card{cursor:pointer;border:2px solid var(--border);border-radius:10px;padding:8px;transition:all .2s;width:90px;text-align:center}
.theme-card:hover{transform:translateY(-2px)}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.theme-preview{width:100%;height:42px;border-radius:6px;border:1px solid;padding:5px;display:flex;flex-direction:column;justify-content:center}
.theme-name{font-size:11px;font-weight:600;margin-top:6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.stat-val{font-size:26px;font-weight:700;color:var(--cream);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* POS TABLES */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.t-card{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;min-height:95px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;user-select:none}
.t-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.t-card.occupied{border-color:var(--green);background:#0a1f12}
.t-card.selected{box-shadow:0 0 0 3px rgba(201,168,76,.35);border-color:var(--accent2)}
.t-card .tnum{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
.t-card .tstatus{font-size:10px;color:var(--text3)}
.t-card .tamount{font-size:12px;color:var(--green);font-weight:600}
.t-card .tstaff{font-size:10px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ORDER PANEL */
.order-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform .3s}
.order-panel.open{transform:translateX(0)}
.op-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.op-title{font-size:17px;font-weight:700;flex:1}
.op-body{flex:1;overflow-y:auto;padding:10px}
.oi{background:var(--surface2);border-radius:8px;padding:9px 11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px}
.oi-info{flex:1;min-width:0}
.oi-name{font-size:13px;font-weight:600}
.oi-meta{font-size:11px;color:var(--text3);margin-top:2px}
.oi-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.oi-price{font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--surface3);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-num{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.qty-badge{display:inline-block;background:var(--accent);color:#1a1000;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px}
.op-foot{padding:14px;border-top:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total-label{font-size:13px;color:var(--text2)}
.total-amt{font-size:20px;font-weight:700;color:var(--accent2)}
.op-actions{display:flex;gap:6px}

/* MENU MODAL */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:10px}
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .2s}
.mi:hover{border-color:var(--accent);transform:translateY(-2px)}
.mi-name{font-size:12px;font-weight:600;margin-bottom:2px}
.mi-size{font-size:10px;color:var(--text3)}
.mi-price{font-size:12px;color:var(--accent)}

/* FOLDER TREE */
.folder{margin-bottom:10px}
.folder-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;user-select:none;border:1px solid var(--border)}
.folder-head:hover{border-color:var(--accent)}
.folder-arrow{transition:transform .2s;font-size:11px}
.folder-body{padding:6px 0 0 16px;display:none}
.folder-body.open{display:block}
.folder-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:7px;margin-bottom:4px;background:var(--surface);border:1px solid var(--border)}
.sub-folder{margin-bottom:6px}
.sub-folder-head{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface3);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;border:1px solid var(--border)}
.sub-folder-body{padding:4px 0 0 14px;display:none}
.sub-folder-body.open{display:block}

/* TOPPING */
.topping-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tchip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s;user-select:none}
.tchip.sel{background:var(--accent);color:#1a1000;border-color:var(--accent)}
.tchip:hover:not(.sel){border-color:var(--accent);color:var(--accent)}

/* SIZE PICKER */
.size-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.size-opt{padding:12px 8px;border-radius:9px;border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .2s}
.size-opt:hover{border-color:var(--accent)}
.size-opt .s-name{font-size:13px;font-weight:600}
.size-opt .s-price{font-size:12px;color:var(--accent);margin-top:3px}

/* RECEIPT PRINT - sẽ in từ popup riêng */

/* HISTORY */
.hist-item{background:var(--surface2);border-radius:9px;margin-bottom:10px;overflow:hidden}
.hist-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
.hist-head:hover{background:rgba(255,255,255,.03)}
.hist-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none}
.hist-body.open{display:block}
.hist-item-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.hist-item-row:last-child{border-bottom:none}
.hist-log{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}

/* QR */
#qr-canvas{display:block;margin:0 auto}

/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .backdrop.show{display:block}
  .hamburger{display:flex;align-items:center}
  .main{margin-left:0;padding:14px;padding-top:52px}
  .order-panel{width:100%}
  .stats-grid{grid-template-columns:1fr 1fr}
  .input-row{flex-direction:column}
  .ph-title{font-size:19px}
}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:13px}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:700;margin-left:4px}
</style>
</head>
<body>

<div id="toast-wrap"></div>
<div id="notif-wrap"></div>
<div id="receipt-iframe-wrap"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1 id="login-shop-name">☕ CaféShop</h1>
      <p>POS SYSTEM</p>
    </div>
    <div class="field">
      <label>Tên đăng nhập</label>
      <div style="position:relative">
        <input class="inp" id="lu" placeholder="admin hoặc tên nhân viên" oninput="updateLoginSuffix()">
        <span class="login-suffix" id="lu-suffix"></span>
      </div>
    </div>
    <div class="field"><label>Mật khẩu</label><input class="inp" type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">Đăng nhập</button>
    <div id="guest-login-wrap" style="display:none">

<script>
// ═══════════ STATE ═══════════
const ADMIN_EMAIL = 'admin@myapp.com';
const DOMAIN = '@myapp.com';
let currentUser = null, isAdmin = false, isGuest = false;
let shopConfig = {}, groups = [], items = [], orders = {}, staffList = [];
let currentTableId = null, selectedToppings = [], guestMode = 'order';
let unsubOrders = null;

// Theme presets - mỗi theme đổi cả accent VÀ background, surface, border
const THEMES = [
  { name:'Cafe Vàng', accent:'#c9a84c', accent2:'#e8c96a',
    bg:'#0f0d0b', surface:'#1a1714', surface2:'#231f1b', surface3:'#2e2924',
    border:'#3a332c', text:'#f0e6d3', text2:'#b0a090', text3:'#6b5f52', cream:'#f5ead8' },
  { name:'Ocean Teal', accent:'#3dbfa0', accent2:'#5ed9bc',
    bg:'#0a1419', surface:'#0f1e26', surface2:'#152b35', surface3:'#1e3b48',
    border:'#244553', text:'#e0eef2', text2:'#90b0bc', text3:'#5a7a86', cream:'#d8ecef' },
  { name:'Rose Pink', accent:'#d4627a', accent2:'#f0849a',
    bg:'#15090e', surface:'#21121a', surface2:'#2c1822', surface3:'#3a212e',
    border:'#4a2a3a', text:'#f0d8df', text2:'#b89aa3', text3:'#7a5e68', cream:'#f5e0e6' },
  { name:'Indigo Tím', accent:'#7b72e9', accent2:'#9e97f5',
    bg:'#0d0b1a', surface:'#161226', surface2:'#1f1a35', surface3:'#2a2447',
    border:'#352c5c', text:'#e6e1f5', text2:'#a39ec2', text3:'#6a6588', cream:'#ece8f8' },
  { name:'Light Cream', accent:'#b8843d', accent2:'#d4a05a',
    bg:'#faf5ec', surface:'#ffffff', surface2:'#f3ecdb', surface3:'#e8dec5',
    border:'#d4c8a8', text:'#3a2e1a', text2:'#6b5a3a', text3:'#9e8a65', cream:'#5c4a2a' },
  { name:'Sage Xanh', accent:'#6b9e5e', accent2:'#88bb7a',
    bg:'#0d130b', surface:'#161e12', surface2:'#1d281a', surface3:'#283525',
    border:'#36452f', text:'#e0eadb', text2:'#9aaa90', text3:'#62725a', cream:'#dde7d6' },
  { name:'Midnight', accent:'#4a9eff', accent2:'#6db4ff',
    bg:'#080b14', surface:'#0e1320', surface2:'#161d2e', surface3:'#1f2940',
    border:'#2a3550', text:'#dde6f5', text2:'#8a98b3', text3:'#5a6680', cream:'#e5edf8' },
  { name:'Amber Cam', accent:'#e09a30', accent2:'#f5b84a',
    bg:'#140d05', surface:'#1f160a', surface2:'#2a1e10', surface3:'#382916',
    border:'#48381d', text:'#f5e4cc', text2:'#bda280', text3:'#7a6850', cream:'#f8ecd6' },
];
const ACCENTS = THEMES; // backward compat

// ═══════════ FIREBASE READY ═══════════
window.addEventListener('firebase-ready', () => {
  const { onAuthStateChanged } = window._firebase;
  // Pre-load shop config for login page
  loadShopConfigPublic();
  onAuthStateChanged(window._auth, async u => {
    if (u) {
      currentUser = u; isAdmin = u.email === ADMIN_EMAIL; isGuest = false;
      // Check if user is banned (not in staff list)
      if (!isAdmin) {
        const ok = await checkStaffAllowed(u.email);
        if (!ok) { toast('Tài khoản bị vô hiệu hoá', 'err'); doLogout(); return; }
        // Check & apply pending password
        await applyPendingPassword(u);
      }
      await loadAllData();
      showApp();
    } else {
      currentUser = null; isAdmin = false;
      hideAll(); showLogin();
    }
  });
});

async function loadShopConfigPublic() {
  try {
    const { doc, getDoc } = window._firebase;
    const snap = await getDoc(doc(window._db, 'config', 'shop'));
    if (snap.exists()) {
      shopConfig = snap.data();
      applyAccent(shopConfig.accent || ACCENTS[0].accent, shopConfig.accent2 || ACCENTS[0].accent2);
      const n = shopConfig.name || 'CaféShop';
      document.getElementById('login-shop-name').textContent = '☕ ' + n;
      document.getElementById('guest-shop-name').textContent = '☕ ' + n;
      document.getElementById('guest-shop-addr').textContent = shopConfig.address || '';
      if (shopConfig.guestEnabled) document.getElementById('guest-login-wrap').style.display = 'block';
    }
  } catch(e){}
}

async function checkStaffAllowed(email) {
  try {
    const { doc, getDoc } = window._firebase;
    const snap = await getDoc(doc(window._db, 'config', 'disabled'));
    if (!snap.exists()) return true; // No disabled list = allow all
    const data = snap.data();
    const list = data.emails || [];
    return !list.includes(email);
  } catch(e) {
    console.error('checkStaffAllowed error:', e);
    return true; // Fallback: allow login
  }
}

async function applyPendingPassword(user) {
  try {
    const { collection, query, where, getDocs, doc, updateDoc, updatePassword } = window._firebase;
    const q = query(collection(window._db, 'staff'), where('email','==',user.email));
    const snap = await getDocs(q);
    if (snap.empty) return;
    const sdoc = snap.docs[0];
    const data = sdoc.data();
    if (data.pendingPwd) {
      try {
        await updatePassword(user, data.pendingPwd);
        await updateDoc(doc(window._db,'staff',sdoc.id), {pendingPwd: null});
        toast('Mật khẩu đã được cập nhật!','ok');
      } catch(e) {
        // Cần re-auth, để pending lại
      }
    }
  } catch(e){}
}

// ═══════════ AUTH ═══════════
function updateLoginSuffix() {
  const v = document.getElementById('lu').value.trim();
  document.getElementById('lu-suffix').textContent = (!v || v.includes('@')) ? '' : DOMAIN;
}

async function doLogin() {
  let u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  if (!u || !p) return toast('Nhập đầy đủ thông tin', 'err');
  if (!u.includes('@')) u += DOMAIN;
  try {
    const { signInWithEmailAndPassword } = window._firebase;
    await signInWithEmailAndPassword(window._auth, u, p);
  } catch(e) { toast('Sai tài khoản hoặc mật khẩu', 'err'); }
}
async function doLogout() {
  const { signOut } = window._firebase;
  await signOut(window._auth);
  // Xoá mật khẩu trong ô input để bảo mật
  const lp = document.getElementById('lp');
  const lu = document.getElementById('lu');
  if (lp) lp.value = '';
  if (lu) lu.value = '';
  const suf = document.getElementById('lu-suffix');
  if (suf) suf.textContent = '';
}
function hideAll() {
  ['login-screen','guest-screen','app'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}
function showLogin() {
  hideAll();
  // Đảm bảo ô password rỗng khi vào lại màn hình login
  const lp = document.getElementById('lp');
  if (lp) lp.value = '';
  document.getElementById('login-screen').style.display = 'flex';
}
function showGuest() {
  isGuest = true;
  hideAll();
  document.getElementById('guest-screen').style.display = 'block';
  loadGuestPage();
}

// ═══════════ GUEST PAGE ═══════════
function setGuestMode(mode) {
  guestMode = mode;
  document.getElementById('guest-btn-order').className = 'btn btn-sm ' + (mode==='order' ? 'btn-gold' : 'btn-outline');
  document.getElementById('guest-btn-pay').className = 'btn btn-sm ' + (mode==='pay' ? 'btn-gold' : 'btn-outline');
  const infoEl = document.getElementById('guest-info');
  infoEl.textContent = mode === 'order' ? 'Chọn bàn bạn muốn ngồi để gọi món:' : 'Chọn bàn của bạn để yêu cầu tính tiền:';
}

async function loadGuestPage() {
  // Load shop config & orders
  try {
    const { doc, getDoc, collection, getDocs } = window._firebase;
    const snap = await getDoc(doc(window._db, 'config', 'shop'));
    if (snap.exists()) shopConfig = snap.data();
    applyAccent(shopConfig.accent, shopConfig.accent2);
    // Subscribe orders
    subscribeOrders();
    renderGuestTables();
  } catch(e) { toast('Lỗi tải dữ liệu', 'err'); }
}

function renderGuestTables() {
  const tableCount = shopConfig.tableCount || 20;
  const grid = document.getElementById('guest-tables-grid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 1; i <= tableCount; i++) {
    const id = 't' + i;
    const hasOrder = !!orders[id];
    const div = document.createElement('div');
    div.className = 'guest-table' + (hasOrder ? ' occupied' : '');
    div.innerHTML = `<div class="tnum">${i}</div><div class="tstatus">${hasOrder ? 'Đang phục vụ' : 'Trống'}</div>`;
    div.onclick = () => handleGuestTableClick(id, i);
    grid.appendChild(div);
  }
}

async function handleGuestTableClick(tableId, tableNum) {
  if (guestMode === 'order') {
    // Gửi notification cho nhân viên đang đăng nhập
    try {
      const { collection, addDoc, serverTimestamp } = window._firebase;
      await addDoc(collection(window._db, 'notifications'), {
        type: 'new_guest', tableId, tableNum, at: serverTimestamp(), read: false
      });
      // Khách chỉ thấy thông báo "đã gọi nhân viên" đơn giản
      toast(`✅ Đã gọi nhân viên! Xin vui lòng chờ trong giây lát.`, 'ok');
    } catch(e) {
      toast('Không thể gọi. Vui lòng gọi trực tiếp nhân viên.', 'err');
    }
  } else {
    try {
      const { collection, addDoc, serverTimestamp } = window._firebase;
      await addDoc(collection(window._db, 'notifications'), {
        type: 'checkout_request', tableId, tableNum, at: serverTimestamp(), read: false
      });
      toast(`✅ Đã yêu cầu tính tiền! Nhân viên sẽ đến ngay.`, 'ok');
    } catch(e) {
      toast('Không thể yêu cầu. Vui lòng gọi trực tiếp nhân viên.', 'err');
    }
  }
}

// ═══════════ LOAD DATA ═══════════
async function loadAllData() {
  const { doc, getDoc, collection, getDocs, query, orderBy } = window._firebase;
  const db = window._db;
  const snap = await getDoc(doc(db, 'config', 'shop'));
  if (snap.exists()) shopConfig = snap.data();
  applyAccent(shopConfig.accent, shopConfig.accent2);

  const [gSnap, iSnap, sSnap] = await Promise.all([
    getDocs(query(collection(db, 'groups'), orderBy('order','asc'))),
    getDocs(collection(db, 'items')),
    getDocs(collection(db, 'staff')),
  ]);
  groups = gSnap.docs.map(d => ({id:d.id,...d.data()}));
  items  = iSnap.docs.map(d => ({id:d.id,...d.data()}));
  staffList = sSnap.docs.map(d => ({id:d.id,...d.data()}));
  subscribeOrders();
  subscribeNotifications();
}

function subscribeOrders() {
  if (unsubOrders) unsubOrders();
  const { collection, onSnapshot } = window._firebase;
  unsubOrders = onSnapshot(collection(window._db, 'orders'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'removed') delete orders[ch.doc.id];
      else orders[ch.doc.id] = {id:ch.doc.id,...ch.doc.data()};
    });
    refreshPOSGrid();
    renderGuestTables();
    if (currentTableId && document.getElementById('order-panel').classList.contains('open')) renderOP(currentTableId);
  });
}

function subscribeNotifications() {
  const { collection, onSnapshot, query, where } = window._firebase;
  onSnapshot(query(collection(window._db,'notifications'), where('read','==',false)), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'added') {
        const d = ch.doc.data();
        if (d.type === 'new_guest') showNotif(`🛎️ Có khách mới tại Bàn ${d.tableNum}`, 'new_guest');
        if (d.type === 'checkout_request') showNotif(`💳 Khách Bàn ${d.tableNum} yêu cầu tính tiền`, 'checkout');
        // Mark read
        const { doc, updateDoc } = window._firebase;
        updateDoc(doc(window._db,'notifications',ch.doc.id), {read:true}).catch(()=>{});
      }
    });
  });
}

// ═══════════ APP UI ═══════════
function showApp() {
  hideAll();
  document.getElementById('app').style.display = 'block';
  buildNav(); updateSidebar(); updateShopUI();
  navigateTo(isAdmin ? 'dashboard' : 'pos');
}

function updateShopUI() {
  const n = shopConfig.name || 'CaféShop';
  document.getElementById('sb-shop-name').textContent = '☕ ' + n;
  document.getElementById('sb-shop-addr').textContent = shopConfig.address || '';
}

function updateSidebar() {
  const name = displayName(currentUser.email);
  document.getElementById('sb-avatar').textContent = name[0].toUpperCase();
  document.getElementById('sb-uname').textContent = name;
  document.getElementById('sb-urole').textContent = isAdmin ? '👑 Admin' : '🧑 Nhân viên';
}

const ADMIN_NAV = [
  {id:'dashboard', icon:'📊', label:'Tổng quan'},
  {id:'config',    icon:'⚙️', label:'Cấu hình quán'},
  {id:'staff',     icon:'👥', label:'Nhân viên'},
  {id:'menu',      icon:'🍽️', label:'Quản lý món'},
  {id:'pos',       icon:'🧾', label:'Bán hàng'},
  {id:'history',   icon:'📋', label:'Lịch sử'},
];
const STAFF_NAV = [{id:'pos',icon:'🧾',label:'Bán hàng'}];

function buildNav() {
  const pages = isAdmin ? ADMIN_NAV : STAFF_NAV;
  document.getElementById('nav').innerHTML = pages.map(p =>
    `<div class="nav-item" id="nav-${p.id}" onclick="navigateTo('${p.id}')">
       <span class="nav-icon">${p.icon}</span>${p.label}
     </div>`).join('');
}

let currentPage = '';
function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav = document.getElementById('nav-'+page);
  if (nav) nav.classList.add('active');
  closeSidebar();
  document.getElementById('main').innerHTML = '<div class="spinner"></div>';
  setTimeout(() => {
    if (page==='dashboard') renderDashboard();
    else if (page==='config')    renderConfig();
    else if (page==='staff')     renderStaff();
    else if (page==='menu')      renderMenuMgmt();
    else if (page==='pos')       renderPOS();
    else if (page==='history')   renderHistory();
  }, 80);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

// ═══════════ HELPERS ═══════════
function displayName(email) { return email ? email.split('@')[0] : ''; }
function fmtMoney(n) { return Number(n||0).toLocaleString('vi-VN') + ' ₫'; }
function safeId(s) {
  // Convert any string (including Vietnamese) to a safe HTML id
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return 'h' + Math.abs(h).toString(36);
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('vi-VN');
}
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='error'?'err':type);
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
function showNotif(msg, type) {
  // Chỉ hiển thị notif cho nhân viên/admin ĐÃ đăng nhập
  // Khách guest không thấy notif này
  if (isGuest || !currentUser) return;
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${type==='new_guest'?'🛎️ KHÁCH MỚI':'💳 TÍNH TIỀN'}</div>${msg}`;
  document.getElementById('notif-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 6000);
}
function applyAccent(a, a2) {
  // Backward compat - tìm theme tương ứng và áp dụng
  if (!a) return;
  const theme = THEMES.find(t => t.accent === a) || THEMES[0];
  applyTheme(theme);
}

function applyTheme(t) {
  if (!t) return;
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent2', t.accent2);
  r.setProperty('--bg', t.bg);
  r.setProperty('--surface', t.surface);
  r.setProperty('--surface2', t.surface2);
  r.setProperty('--surface3', t.surface3);
  r.setProperty('--border', t.border);
  r.setProperty('--text', t.text);
  r.setProperty('--text2', t.text2);
  r.setProperty('--text3', t.text3);
  r.setProperty('--cream', t.cream);
}

// Modal
function openModal(html) {
  document.getElementById('modal-wrap').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() { document.getElementById('modal-wrap').innerHTML = ''; }

// ═══════════ DASHBOARD ═══════════
function renderDashboard() {
  const open = Object.values(orders).length;
  const tc = shopConfig.tableCount || 20;
  document.getElementById('main').innerHTML = `
    <div class="ph"><div><h2 class="ph-title">Tổng quan</h2></div></div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Bàn đang dùng</div><div class="stat-val">${open}</div><div class="stat-sub">/ ${tc} bàn</div></div>
      <div class="stat"><div class="stat-label">Nhóm món</div><div class="stat-val">${groups.length}</div><div class="stat-sub">nhóm</div></div>
      <div class="stat"><div class="stat-label">Tổng món</div><div class="stat-val">${items.length}</div><div class="stat-sub">sản phẩm</div></div>
      <div class="stat"><div class="stat-label">Nhân viên</div><div class="stat-val">${staffList.filter(s=>s.active).length}</div><div class="stat-sub">đang hoạt động</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span>🛎️ Bàn đang có khách</span></div>
      <div id="dash-tables"></div>
    </div>`;
  const occ = Object.values(orders);
  const dt = document.getElementById('dash-tables');
  if (!occ.length) { dt.innerHTML = '<div class="empty">Chưa có bàn nào đang phục vụ</div>'; return; }
  dt.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>Bàn</th><th>Nhân viên</th><th>Số món</th><th>Tổng tiền</th></tr></thead>
    <tbody>${occ.map(o=>`<tr>
      <td>🪑 Bàn ${o.tableId.replace('t','')}</td>
      <td>${displayName(o.staffEmail||'')}</td>
      <td>${(o.items||[]).reduce((s,i)=>s+(i.qty||1),0)} món</td>
      <td style="color:var(--accent)">${fmtMoney(calcTotal(o))}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ═══════════ CONFIG ═══════════
function renderConfig() {
  const tc = shopConfig.tableCount || 20;
  const cur = THEMES.findIndex(a=>a.accent===(shopConfig.accent||THEMES[0].accent));
  document.getElementById('main').innerHTML = `
    <div class="ph"><div><h2 class="ph-title">Cấu hình quán</h2></div></div>
    <div class="card">

              <div style="background:${t.surface};height:8px;width:60%;border-radius:2px;margin-bottom:3px"></div>

let pickedAccentIdx = null;
function pickAccent(i, el) {
  document.querySelectorAll('.theme-card').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  pickedAccentIdx = i;
  applyTheme(THEMES[i]);
}

async function saveConfig() {
  const { doc, setDoc } = window._firebase;
  const tc = parseInt(document.getElementById('cfg-tables').value)||20;
  const ai = pickedAccentIdx !== null ? pickedAccentIdx : THEMES.findIndex(a=>a.accent===(shopConfig.accent||THEMES[0].accent));
  const t = THEMES[Math.max(0,ai)];
  shopConfig = {
    name: document.getElementById('cfg-name').value.trim(),
    address: document.getElementById('cfg-addr').value.trim(),
    phone: document.getElementById('cfg-phone').value.trim(),
    footer: document.getElementById('cfg-footer').value.trim(),
    bank: document.getElementById('cfg-bank').value.trim(),
    bankNum: document.getElementById('cfg-banknum').value.trim(),
    bankName: document.getElementById('cfg-bankname').value.trim(),
    tableCount: tc,
    guestEnabled: document.getElementById('cfg-guest').checked,
    accent: t.accent, accent2: t.accent2,
    themeName: t.name,
  };
  await setDoc(doc(window._db,'config','shop'), shopConfig);
  applyTheme(t);
  updateShopUI();
  if (shopConfig.guestEnabled) document.getElementById('guest-login-wrap').style.display='block';
  toast('Đã lưu cấu hình!','ok'); pickedAccentIdx = null;
}

// ═══════════ STAFF ═══════════
function renderStaff() {
  document.getElementById('main').innerHTML = `
    <div class="ph">
      <div><h2 class="ph-title">Quản lý nhân viên</h2></div>
      <button class="btn btn-gold btn-sm" onclick="openAddStaffModal()">+ Thêm nhân viên</button>
    </div>
    <div class="card">
      <div class="card-title"><span>👥 Danh sách nhân viên</span></div>
      <div id="staff-list-area"><div class="spinner"></div></div>
    </div>`;
  renderStaffList();
}

function renderStaffList() {
  const area = document.getElementById('staff-list-area');
  if (!area) return;
  if (!staffList.length) { area.innerHTML = '<div class="empty">Chưa có nhân viên nào</div>'; return; }
  area.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>Tên đăng nhập</th><th>Họ tên</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
    <tbody>${staffList.map(s=>{
      const isActive = s.active !== false;
      return `<tr style="${isActive?'':'opacity:.55'}">
        <td>${displayName(s.email)}</td>
        <td>${s.fullName||'-'}</td>
        <td>${isActive?'<span class="tag tag-green">Hoạt động</span>':'<span class="tag tag-red">Vô hiệu</span>'}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-xs" onclick="openEditStaff('${s.id}')">✏️ Sửa</button>
          ${isActive
            ? `<button class="btn btn-red btn-xs" onclick="deactivateStaff('${s.id}','${s.email}')">🚫 Vô hiệu</button>`
            : `<button class="btn btn-green btn-xs" onclick="reactivateStaff('${s.id}','${s.email}')">✅ Kích hoạt</button>`}
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function openAddStaffModal() {
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>Thêm nhân viên</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Tên đăng nhập</label>
        <div style="position:relative"><input class="inp" id="su" placeholder="VD: nguyenvan"><span class="login-suffix">${DOMAIN}</span></div>
      </div>
      <div class="field"><label>Họ tên (tuỳ chọn)</label><input class="inp" id="sfn" placeholder="Nguyễn Văn A"></div>
      <div class="field"><label>Mật khẩu</label><input class="inp" type="password" id="sp" placeholder="Tối thiểu 6 ký tự"></div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="addStaff()">Tạo tài khoản</button>
      </div>
    </div>`);
}

async function addStaff() {
  let u = document.getElementById('su').value.trim();
  const fn = document.getElementById('sfn').value.trim();
  const p = document.getElementById('sp').value;
  if (!u) return toast('Nhập tên đăng nhập','err');
  if (p.length < 6) return toast('Mật khẩu ≥ 6 ký tự','err');
  if (!u.includes('@')) u += DOMAIN;
  // Check duplicate
  if (staffList.find(s=>s.email===u && s.active!==false)) return toast('Tài khoản đã tồn tại','err');
  try {
    const { initializeApp, getApps, getAuth, createUserWithEmailAndPassword } = window._firebase;
    const apps = getApps();
    const sec = apps.find(a=>a.name==='sec') || initializeApp(window._app.options,'sec');
    const secAuth = getAuth(sec);
    await createUserWithEmailAndPassword(secAuth, u, p);
    await secAuth.signOut();
    // Write to Firestore staff collection
    const { collection, addDoc } = window._firebase;
    const ref = await addDoc(collection(window._db,'staff'), {email:u, fullName:fn, active:true, createdAt:new Date().toISOString()});
    staffList.push({id:ref.id, email:u, fullName:fn, active:true});
    closeModal(); toast('✅ Đã tạo tài khoản: ' + displayName(u), 'ok');
    renderStaffList();
  } catch(e) { toast('Lỗi: '+(e.message||e),'err'); }
}

function openEditStaff(id) {
  const s = staffList.find(x=>x.id===id);
  if (!s) return;
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>Sửa nhân viên: ${displayName(s.email)}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Họ tên</label><input class="inp" id="ef" value="${s.fullName||''}" placeholder="Họ tên"></div>
      <div class="field"><label>Mật khẩu mới (để trống nếu không đổi)</label><input class="inp" type="password" id="ep" placeholder="Mật khẩu mới"></div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="saveEditStaff('${id}','${s.email}')">Lưu</button>
      </div>
    </div>`);
}

async function saveEditStaff(id, email) {
  const fn = document.getElementById('ef').value.trim();
  const np = document.getElementById('ep').value;
  const { doc, updateDoc } = window._firebase;
  await updateDoc(doc(window._db,'staff',id), {fullName:fn});
  const s = staffList.find(x=>x.id===id);
  if (s) s.fullName = fn;
  if (np && np.length >= 6) {
    // Lưu pending password - sẽ áp dụng khi user đó đăng nhập lần tới
    await updateDoc(doc(window._db,'staff',id), {pendingPwd: np});
    toast('✅ Mật khẩu mới sẽ tự động áp dụng khi nhân viên đó đăng nhập lại','info');
  }
  closeModal(); toast('Đã cập nhật','ok'); renderStaffList();
}

async function deactivateStaff(id, email) {
  if (!confirm(`Vô hiệu hoá tài khoản ${displayName(email)}?\nHọ sẽ không đăng nhập được nữa.`)) return;
  const { doc, updateDoc, getDoc, setDoc } = window._firebase;
  // Update staff doc
  await updateDoc(doc(window._db,'staff',id), {active:false});
  // Add to disabled list (single doc that all users can read)
  const disRef = doc(window._db, 'config', 'disabled');
  const snap = await getDoc(disRef);
  const cur = snap.exists() ? (snap.data().emails || []) : [];
  if (!cur.includes(email)) cur.push(email);
  await setDoc(disRef, { emails: cur });
  staffList = staffList.map(s=>s.id===id?{...s,active:false}:s);
  toast('Đã vô hiệu hoá tài khoản','ok'); renderStaffList();
}

async function reactivateStaff(id, email) {
  const { doc, updateDoc, getDoc, setDoc } = window._firebase;
  await updateDoc(doc(window._db,'staff',id), {active:true});
  const disRef = doc(window._db, 'config', 'disabled');
  const snap = await getDoc(disRef);
  const cur = snap.exists() ? (snap.data().emails || []) : [];
  const idx = cur.indexOf(email);
  if (idx >= 0) cur.splice(idx, 1);
  await setDoc(disRef, { emails: cur });
  staffList = staffList.map(s=>s.id===id?{...s,active:true}:s);
  toast('Đã kích hoạt lại tài khoản','ok'); renderStaffList();
}

// ═══════════ MENU MANAGEMENT ═══════════
let menuTab = 'tree';
function renderMenuMgmt() {
  document.getElementById('main').innerHTML = `
    <div class="ph">
      <div><h2 class="ph-title">Quản lý món</h2></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="openGroupModal()">+ Thêm nhóm</button>
        <button class="btn btn-gold btn-sm" onclick="openItemModal()">+ Thêm món</button>
      </div>
    </div>
    <div id="menu-tree"></div>`;
  renderMenuTree();
}

function renderMenuTree() {
  const area = document.getElementById('menu-tree');
  if (!area) return;
  if (!groups.length) { area.innerHTML = '<div class="empty">Chưa có nhóm món nào. Thêm nhóm trước.</div>'; return; }
  area.innerHTML = groups.map(g => {
    const gItems = items.filter(i=>i.groupId===g.id);
    // Group items by name (for sizes)
    const byName = {};
    gItems.forEach(it => {
      if (!byName[it.name]) byName[it.name] = [];
      byName[it.name].push(it);
    });
    const isTopping = g.name && g.name.toLowerCase()==='topping';
    return `<div class="folder card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div class="folder-head" onclick="toggleFolder('fg-${g.id}',this)">
        <span class="folder-arrow" id="fa-fg-${g.id}">▶</span>
        <span>${isTopping?'🫧 ':''} ${g.name}</span>
        <span class="tag tag-gold" style="margin-left:auto">${gItems.length} món</span>
        <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="event.stopPropagation();openEditGroup('${g.id}')">✏️</button>
        <button class="btn btn-red btn-xs" style="margin-left:4px" onclick="event.stopPropagation();deleteGroup('${g.id}')">🗑</button>
      </div>
      <div class="folder-body" id="fg-${g.id}" style="padding:8px 12px">
        ${Object.entries(byName).length ? Object.entries(byName).map(([name, sizes]) => {
          if (sizes.length === 1 && !sizes[0].size) {
            return `<div class="folder-item">
              <span style="font-size:13px;font-weight:500">${name}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="color:var(--accent);font-size:13px">${fmtMoney(sizes[0].price)}</span>
                <button class="btn btn-ghost btn-xs" onclick="openEditItem('${sizes[0].id}')">✏️</button>
                <button class="btn btn-red btn-xs" onclick="deleteItem('${sizes[0].id}')">🗑</button>
              </div>
            </div>`;
          }
          return `<div class="sub-folder">
            <div class="sub-folder-head" onclick="toggleFolder('sf-${g.id}-${safeId(name)}',this)">
              <span class="folder-arrow" id="fa-sf-${g.id}-${safeId(name)}">▶</span>
              📦 ${name}
              <span class="tag tag-blue" style="margin-left:auto">${sizes.length} size</span>
            </div>
            <div class="sub-folder-body" id="sf-${g.id}-${safeId(name)}">
              ${sizes.map(s=>`<div class="folder-item" style="margin-bottom:4px">
                <span style="font-size:12px">${s.size||'Mặc định'}</span>
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="color:var(--accent);font-size:12px">${fmtMoney(s.price)}</span>
                  <button class="btn btn-ghost btn-xs" onclick="openEditItem('${s.id}')">✏️</button>
                  <button class="btn btn-red btn-xs" onclick="deleteItem('${s.id}')">🗑</button>
                </div>
              </div>`).join('')}
            </div>
          </div>`;
        }).join('') : '<div class="empty" style="padding:12px">Chưa có món trong nhóm này</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleFolder(id, headEl) {
  const body = document.getElementById(id);
  const arrow = document.getElementById('fa-'+id);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : '';
}

function openGroupModal(editId) {
  const g = editId ? groups.find(x=>x.id===editId) : null;
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>${g?'Sửa nhóm':'Thêm nhóm'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Tên nhóm</label><input class="inp" id="gn" value="${g?g.name:''}" placeholder="VD: Cà phê, Trà sữa, Topping..."></div>
      <div class="field"><label>Thứ tự hiển thị</label><input class="inp" type="number" id="go" value="${g?g.order:groups.length}"></div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="${g?'saveEditGroup(\''+editId+'\')':'addGroup()'}">Lưu</button>
      </div>
    </div>`);
}

function openEditGroup(id) { openGroupModal(id); }

async function addGroup() {
  const name = document.getElementById('gn').value.trim();
  const ord = parseInt(document.getElementById('go').value)||0;
  if (!name) return toast('Nhập tên nhóm','err');
  if (groups.find(g=>g.name.toLowerCase()===name.toLowerCase())) return toast('Nhóm đã tồn tại','err');
  const { collection, addDoc } = window._firebase;
  const ref = await addDoc(collection(window._db,'groups'), {name, order:ord});
  groups.push({id:ref.id, name, order:ord});
  groups.sort((a,b)=>(a.order||0)-(b.order||0));
  closeModal(); toast('Đã thêm nhóm: '+name,'ok'); renderMenuTree();
}

async function saveEditGroup(id) {
  const name = document.getElementById('gn').value.trim();
  const ord = parseInt(document.getElementById('go').value)||0;
  if (!name) return toast('Nhập tên nhóm','err');
  const { doc, updateDoc } = window._firebase;
  await updateDoc(doc(window._db,'groups',id), {name, order:ord});
  const g = groups.find(x=>x.id===id);
  if (g) { g.name=name; g.order=ord; }
  groups.sort((a,b)=>(a.order||0)-(b.order||0));
  closeModal(); toast('Đã cập nhật nhóm','ok'); renderMenuTree();
}

async function deleteGroup(id) {
  if (!confirm('Xoá nhóm này? Các món trong nhóm cũng sẽ bị xoá.')) return;
  const { doc, deleteDoc, collection, getDocs, query, where } = window._firebase;
  const q = query(collection(window._db,'items'), where('groupId','==',id));
  const snap = await getDocs(q);
  for (const d of snap.docs) await deleteDoc(doc(window._db,'items',d.id));
  await deleteDoc(doc(window._db,'groups',id));
  groups = groups.filter(g=>g.id!==id);
  items = items.filter(i=>i.groupId!==id);
  toast('Đã xoá nhóm','ok'); renderMenuTree();
}

function openItemModal(editId) {
  const it = editId ? items.find(x=>x.id===editId) : null;
  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>${it?'Sửa món':'Thêm món'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Tên món</label><input class="inp" id="in" value="${it?it.name:''}" placeholder="VD: Cà phê đen, Trà đào..."></div>
      <div class="field"><label>Nhóm</label>
        <select class="inp" id="ig">
          <option value="">-- Chọn nhóm --</option>
          ${groups.map(g=>`<option value="${g.id}" ${it&&it.groupId===g.id?'selected':''}>${g.name}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Size (để trống nếu không có)</label><input class="inp" id="is" value="${it?it.size||'':''}" placeholder="VD: S, M, L, Nhỏ, Vừa..."></div>
      <div class="field"><label>Giá (₫)</label><input class="inp" type="number" id="ip" value="${it?it.price:''}" placeholder="25000"></div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="${it?'saveEditItem(\''+editId+'\')':'addItem()'}">Lưu</button>
      </div>
    </div>`);
}

function openEditItem(id) { openItemModal(id); }

async function addItem() {
  const name = document.getElementById('in').value.trim();
  const gid = document.getElementById('ig').value;
  const size = document.getElementById('is').value.trim();
  const price = parseInt(document.getElementById('ip').value)||0;
  if (!name||!gid||!price) return toast('Điền đầy đủ thông tin','err');
  // Check duplicate (same name + group + size)
  if (items.find(i=>i.name===name&&i.groupId===gid&&(i.size||'')===(size||''))) return toast('Món này đã tồn tại (trùng tên + size)','err');
  const { collection, addDoc } = window._firebase;
  const ref = await addDoc(collection(window._db,'items'), {name, groupId:gid, size, price});
  items.push({id:ref.id, name, groupId:gid, size, price});
  closeModal(); toast('Đã thêm món: '+name,'ok'); renderMenuTree();
}

async function saveEditItem(id) {
  const name = document.getElementById('in').value.trim();
  const gid = document.getElementById('ig').value;
  const size = document.getElementById('is').value.trim();
  const price = parseInt(document.getElementById('ip').value)||0;
  if (!name||!gid||!price) return toast('Điền đầy đủ','err');
  const { doc, updateDoc } = window._firebase;
  await updateDoc(doc(window._db,'items',id), {name, groupId:gid, size, price});
  const i = items.find(x=>x.id===id);
  if (i) { i.name=name; i.groupId=gid; i.size=size; i.price=price; }
  closeModal(); toast('Đã cập nhật','ok'); renderMenuTree();
}

async function deleteItem(id) {
  if (!confirm('Xoá món này?')) return;
  const { doc, deleteDoc } = window._firebase;
  await deleteDoc(doc(window._db,'items',id));
  items = items.filter(i=>i.id!==id);
  toast('Đã xoá','ok'); renderMenuTree();
}

// ═══════════ POS ═══════════
function renderPOS() {
  document.getElementById('main').innerHTML = `
    <div class="ph">
      <div><h2 class="ph-title">🧾 Bán hàng</h2><div class="ph-sub">Chọn bàn để order</div></div>
    </div>
    <div class="pos-grid" id="pos-grid"></div>`;
  refreshPOSGrid();
}

function refreshPOSGrid() {
  const grid = document.getElementById('pos-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const tc = shopConfig.tableCount || 20;
  for (let i = 1; i <= tc; i++) {
    const id = 't'+i;
    const ord = orders[id];
    const card = document.createElement('div');
    card.className = 't-card' + (ord?' occupied':'') + (id===currentTableId?' selected':'');
    card.draggable = true;
    card.dataset.id = id;
    card.innerHTML = `
      <div class="tnum">${i}</div>
      <div class="tstatus">${ord?'Có khách':'Trống'}</div>
      ${ord?`<div class="tamount">${fmtMoney(calcTotal(ord))}</div>
             <div class="tstaff">${displayName(ord.staffEmail||'')}</div>`:''}`;
    card.onclick = () => selectTable(id);
    card.addEventListener('dragstart', e=>e.dataTransfer.setData('text',id));
    card.addEventListener('dragover', e=>{e.preventDefault();card.style.outline='2px dashed var(--accent2)'});
    card.addEventListener('dragleave', ()=>card.style.outline='');
    card.addEventListener('drop', e=>{
      e.preventDefault(); card.style.outline='';
      const from = e.dataTransfer.getData('text');
      if (from && from!==id) confirmMerge(from, id);
    });
    grid.appendChild(card);
  }
}

function openOP(tableId) {

}
function closeOP() {
  document.getElementById('order-panel').classList.remove('open');

function renderOP(tableId) {
  const num = tableId.replace('t','');
  const ord = orders[tableId];
  document.getElementById('op-title').textContent = `🪑 Bàn ${num}`;
  document.getElementById('op-meta').textContent = ord&&ord.mergeLog&&ord.mergeLog.length
    ? `(gộp từ: ${[...new Set((ord.mergeLog||[]).filter(l=>l.action==='merge'||l.action==='drag-merge').map(l=>l.fromTableNum))].join(', ')})`
    : '';
  const body = document.getElementById('op-body');
  if (!ord||!ord.items||!ord.items.length) {
    body.innerHTML = '<div class="empty">Chưa có món nào<br>Nhấn "+ Thêm món"</div>';
    document.getElementById('op-total').textContent = '0 ₫'; return;
  }

  // Merge same item (same name+size+toppings → sum qty)
  const merged = mergeOrderItems(ord.items);
  body.innerHTML = merged.map((it,idx)=>`
    <div class="oi">
      <div class="oi-info">
        <div class="oi-name">${it.name}${it.qty>1?`<span class="qty-badge">×${it.qty}</span>`:''}</div>
        <div class="oi-meta">
          ${it.size?`📏${it.size} `:''} 
          ${(it.toppings||[]).length?'🫧'+it.toppings.join(','):''}
          ${it.orderBy?`👤${displayName(it.orderBy)}`:''}
        </div>
      </div>
      <div class="oi-right">
        <div class="oi-price">${fmtMoney(it.price*it.qty)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${tableId}',${idx},-1)">−</button>
          <span class="qty-num">${it.qty}</span>
          <button class="qty-btn" onclick="changeQty('${tableId}',${idx},1)">+</button>
        </div>
        <button class="btn btn-red btn-xs" onclick="removeItem('${tableId}',${idx})">✕</button>
      </div>
    </div>`).join('');
  document.getElementById('op-total').textContent = fmtMoney(calcTotal(ord));
}

function mergeOrderItems(itemsArr) {
  // Group by (name+size+toppings) and sum qty
  const map = {};
  itemsArr.forEach(it => {
    const key = [it.name, it.size||'', (it.toppings||[]).sort().join('|')].join('__');
    if (!map[key]) map[key] = {...it, qty: it.qty||1};
    else map[key].qty += (it.qty||1);
  });
  return Object.values(map);
}

async function changeQty(tableId, idx, delta) {
  const ord = orders[tableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);
  const target = merged[idx];
  if (!target) return;
  const oldQty = target.qty;
  const newQty = Math.max(1, oldQty + delta);
  if (newQty === oldQty) return;

  const tkey = [target.name, target.size||'', (target.toppings||[]).slice().sort().join('|')].join('__');

  // Gom tất cả items trùng key thành 1 item duy nhất (dedup), rồi set qty = newQty
  const same = [];
  const others = [];
  ord.items.forEach(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    if (k === tkey) same.push(it);
    else others.push(it);
  });
  if (!same.length) return;
  // Giữ 1 item duy nhất, set qty = newQty
  const keep = { ...same[0], qty: newQty };
  ord.items = [...others, keep];

  await saveOrder(tableId, ord);
  await logHistory(tableId, `Đổi SL: ${target.name}${target.size?' ('+target.size+')':''} ${oldQty} → ${newQty}`);
}

async function removeItem(tableId, idx) {
  const ord = orders[tableId]; if (!ord) return;
  const merged = mergeOrderItems(ord.items);
  const target = merged[idx];
  if (!target) return;
  if (!confirm(`Xoá món "${target.name}${target.size?' ('+target.size+')':''}" × ${target.qty}?`)) return;
  const tkey = [target.name, target.size||'', (target.toppings||[]).slice().sort().join('|')].join('__');
  await logHistory(tableId, `Xoá món: ${target.name}${target.size?' ('+target.size+')':''} × ${target.qty}`);
  ord.items = ord.items.filter(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    return k !== tkey;
  });
  await saveOrder(tableId, ord);
  toast(`Đã xoá: ${target.name}`, 'ok');
}

async function saveOrder(tableId, ordData) {
  const { doc, setDoc, serverTimestamp } = window._firebase;
  const data = { tableId, items: ordData.items||[], staffEmail: ordData.staffEmail||currentUser?.email||'',
    staffName: ordData.staffName||displayName(ordData.staffEmail||currentUser?.email||''),
    mergeLog: ordData.mergeLog||[], createdAt: ordData.createdAt||serverTimestamp(), updatedAt: serverTimestamp() };
  await setDoc(doc(window._db,'orders',tableId), data);
}

function calcTotal(ord) {
  if (!ord||!ord.items) return 0;
  return ord.items.reduce((s,it)=>s+(it.price*(it.qty||1)),0);
}

// Thêm vào giỏ tạm (KHÔNG ghi Firebase)
function addToCartDraft(itemId) {
  const item = items.find(i=>i.id===itemId);
  if (!item) return;
  const toppingCost = selectedToppings.reduce((s,t)=>s+t.price, 0);
  const toppingNames = selectedToppings.map(t=>t.name);

  const newKey = [item.name, item.size||'', [...toppingNames].sort().join('|')].join('__');
  const existing = cartDraft.find(it => {
    const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
    return k === newKey;
  });

  if (existing) {
    existing.qty = (existing.qty||1) + 1;
  } else {
    cartDraft.push({
      itemId, name:item.name, size:item.size||'',
      price: item.price + toppingCost, basePrice: item.price,
      toppings: toppingNames, qty: 1,
    });
  }

  // Reset topping sau khi thêm món
  selectedToppings = [];
  document.querySelectorAll('.tchip.sel').forEach(el=>el.classList.remove('sel'));
  renderCartDraft();
  // Flash cart
  const card = document.getElementById('cart-count');
  if (card) { card.style.transform='scale(1.3)'; setTimeout(()=>card.style.transform='',200); }
}

function renderCartDraft() {
  const list = document.getElementById('cart-draft-list');
  const countEl = document.getElementById('cart-count');
  const totalEl = document.getElementById('cart-total');
  if (!list) return;
  if (!cartDraft.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px;font-size:12px">Chọn món để thêm vào giỏ...</div>';
    if (countEl) countEl.textContent = '0';
    if (totalEl) totalEl.textContent = '0 ₫';
    return;
  }
  list.innerHTML = cartDraft.map((it,idx)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:7px;margin-bottom:4px;font-size:12px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600">${escapeHTML(it.name)}${it.size?' ('+escapeHTML(it.size)+')':''}</div>
        ${it.toppings&&it.toppings.length?`<div style="font-size:10px;color:var(--text3)">+ ${it.toppings.join(', ')}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="qty-btn" style="width:22px;height:22px;font-size:13px" onclick="draftChangeQty(${idx},-1)">−</button>
        <span style="min-width:18px;text-align:center;font-weight:700">${it.qty}</span>
        <button class="qty-btn" style="width:22px;height:22px;font-size:13px" onclick="draftChangeQty(${idx},1)">+</button>
      </div>
      <div style="color:var(--accent);font-weight:600;min-width:65px;text-align:right">${fmtMoney(it.price*it.qty)}</div>
      <button class="btn btn-red btn-xs" style="padding:2px 6px" onclick="draftRemove(${idx})">✕</button>
    </div>
  `).join('');
  const total = cartDraft.reduce((s,it)=>s+it.price*it.qty, 0);
  const count = cartDraft.reduce((s,it)=>s+it.qty, 0);
  if (countEl) countEl.textContent = count;
  if (totalEl) totalEl.textContent = fmtMoney(total);
}

function draftChangeQty(idx, delta) {
  if (!cartDraft[idx]) return;
  cartDraft[idx].qty = Math.max(1, cartDraft[idx].qty + delta);
  renderCartDraft();
}

function draftRemove(idx) {
  cartDraft.splice(idx, 1);
  renderCartDraft();
}

// XÁC NHẬN - giờ mới ghi Firebase
async function confirmCartDraft() {
  if (!cartDraft.length) return toast('Chưa chọn món nào','err');
  const tableId = currentTableId;
  const ord = orders[tableId] || { tableId, items:[], staffEmail:currentUser.email, staffName:displayName(currentUser.email), mergeLog:[] };
  ord.items = ord.items || [];

  // Merge cartDraft vào ord.items
  for (const cartItem of cartDraft) {
    const cartKey = [cartItem.name, cartItem.size||'', (cartItem.toppings||[]).slice().sort().join('|')].join('__');
    const existing = ord.items.find(it => {
      const k = [it.name, it.size||'', (it.toppings||[]).slice().sort().join('|')].join('__');
      return k === cartKey;
    });
    if (existing) {
      existing.qty = (existing.qty||1) + cartItem.qty;
    } else {
      ord.items.push({
        ...cartItem,
        orderBy: currentUser.email,
        orderByName: displayName(currentUser.email),
        addedAt: new Date().toISOString()
      });
    }
  }

  await saveOrder(tableId, ord);
  // Log từng món
  for (const it of cartDraft) {
    await logHistory(tableId, `Thêm: ${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' + '+it.toppings.join(','):''} × ${it.qty}`);
  }
  toast(`✅ Đã thêm ${cartDraft.reduce((s,it)=>s+it.qty,0)} món vào Bàn ${tableId.replace('t','')}`, 'ok');
  cartDraft = [];
  selectedToppings = [];
  closeModal();
}

      <p style="font-size:11px;color:var(--text3);margin-bottom:14px">🟢 = đang có khách</p>

          return `<div class="tchip${has?' sel':''}" id="ms-${id}" onclick="this.classList.toggle('sel')" style="${has?'border-color:var(--green);color:var(--green)':''}">Bàn ${num}${has?' 🟢':''}</div>`;
        }).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        <button class="btn btn-gold btn-sm" onclick="doMerge()">✅ Gộp bàn</button>
      </div>
    </div>`);
}

async function doMerge() {
  const selected = Array.from(document.querySelectorAll('[id^="ms-"].sel')).map(el=>el.id.replace('ms-',''));
  if (!selected.length) return toast('Chọn ít nhất 1 bàn','err');
  const { doc, deleteDoc } = window._firebase;
  const master = orders[currentTableId]||{tableId:currentTableId,items:[],staffEmail:currentUser.email,staffName:displayName(currentUser.email),mergeLog:[]};
  master.items = master.items||[]; master.mergeLog = master.mergeLog||[];

  for (const sid of selected) {
    const slave = orders[sid];
    if (slave&&slave.items) {
      master.items.push(...slave.items.map(it=>({...it, fromTable:sid, fromTableNum:sid.replace('t','')})));
    }
    master.mergeLog.push({action:'merge', fromTable:sid, fromTableNum:sid.replace('t',''), by:currentUser.email, at:new Date().toISOString()});
    try { await deleteDoc(doc(window._db,'orders',sid)); } catch(e){}
    await logHistory(sid, `Gộp vào Bàn ${currentTableId.replace('t','')} bởi ${displayName(currentUser.email)}`);
  }
  await saveOrder(currentTableId, master);
  await logHistory(currentTableId, `Gộp bàn ${selected.map(id=>'Bàn '+id.replace('t','')).join(',')} vào bởi ${displayName(currentUser.email)}`);
  toast(`✅ Đã gộp ${selected.map(id=>'Bàn '+id.replace('t','')).join(', ')} → Bàn ${currentTableId.replace('t','')}`, 'ok');
  closeModal(); renderOP(currentTableId);
}

async function confirmMerge(fromId, toId) {
  if (!confirm(`Gộp Bàn ${fromId.replace('t','')} → Bàn ${toId.replace('t','')}?\nToàn bộ món chuyển sang, Bàn ${fromId.replace('t','')} sẽ trống.`)) return;
  const { doc, deleteDoc } = window._firebase;
  const master = orders[toId]||{tableId:toId,items:[],staffEmail:currentUser.email,staffName:displayName(currentUser.email),mergeLog:[]};
  master.items = master.items||[]; master.mergeLog = master.mergeLog||[];
  const slave = orders[fromId];
  if (slave&&slave.items) master.items.push(...slave.items.map(it=>({...it, fromTable:fromId, fromTableNum:fromId.replace('t','')})));
  master.mergeLog.push({action:'drag-merge', fromTable:fromId, fromTableNum:fromId.replace('t',''), by:currentUser.email, at:new Date().toISOString()});
  try { await deleteDoc(doc(window._db,'orders',fromId)); } catch(e){}
  await saveOrder(toId, master);
  await logHistory(fromId, `Gộp vào Bàn ${toId.replace('t','')} (kéo thả) bởi ${displayName(currentUser.email)}`);
  await logHistory(toId, `Nhận gộp từ Bàn ${fromId.replace('t','')} bởi ${displayName(currentUser.email)}`);
  toast(`✅ Gộp Bàn ${fromId.replace('t','')} → Bàn ${toId.replace('t','')}`, 'ok');
  if (currentTableId===toId) renderOP(toId);
}

// ═══════════ CHECKOUT ═══════════
function openCheckout() {
  if (!currentTableId) return;
  const ord = orders[currentTableId];
  if (!ord||!ord.items||!ord.items.length) return toast('Chưa có món','err');
  const total = calcTotal(ord);
  const merged = mergeOrderItems(ord.items);

  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>💳 Tính tiền – Bàn ${currentTableId.replace('t','')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="margin-bottom:14px;max-height:220px;overflow-y:auto">
        ${merged.map(it=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span>${it.name}${it.size?' ('+it.size+')':''}${it.toppings&&it.toppings.length?' +'+it.toppings.join(','):''} ×${it.qty}</span>
          <span style="color:var(--accent)">${fmtMoney(it.price*it.qty)}</span>
        </div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:17px;font-weight:700;color:var(--accent2);margin-bottom:16px">
        <span>TỔNG</span><span>${fmtMoney(total)}</span>
      </div>
      <div class="input-row">
        <div class="field"><label>Tiền khách đưa (₫)</label><input class="inp" type="number" id="cash-in" placeholder="${total}" oninput="calcChange(${total})"></div>
        <div class="field" style="display:flex;align-items:flex-end"><div id="change-disp" style="font-size:14px;font-weight:600;padding-bottom:14px"></div></div>
      </div>
      <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
        ${shopConfig.bankNum?`<button class="btn btn-blue btn-sm" onclick="showQR(${total})">📱 QR</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="doPrint()">🖨️ In HĐ</button>
        <button class="btn btn-green btn-sm" onclick="doCheckout()">✅ Thanh toán</button>
      </div>
    </div>`);
}

function calcChange(total) {
  const given = parseInt(document.getElementById('cash-in').value)||0;
  const change = given - total;
  document.getElementById('change-disp').innerHTML = change >= 0
    ? `<span style="color:var(--green)">Thừa: ${fmtMoney(change)}</span>`
    : `<span style="color:var(--red)">Thiếu: ${fmtMoney(-change)}</span>`;
}

function showQR(total) {
  const b = (shopConfig.bankNum||'').replace(/\s/g,'');
  const bn = shopConfig.bankName||'';
  const bank = (shopConfig.bank||'').toUpperCase().trim();
  const desc = `BAN${currentTableId.replace('t','')}`;

  // VietQR API: https://img.vietqr.io/image/{BANK}-{ACCOUNT}-compact2.png?amount=&addInfo=&accountName=
  // BANK có thể là tên viết tắt: VCB, TCB, TPB, ACB, MB, BIDV, VPB, SHB, EIB, OCB, MSB, NAB, HDB, SCB...
  const qrUrl = `https://img.vietqr.io/image/${encodeURIComponent(bank)}-${encodeURIComponent(b)}-compact2.png?amount=${total}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(bn)}`;

  openModal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title"><h3>📱 Quét QR thanh toán</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="text-align:center;padding:8px">
        <img src="${qrUrl}" style="max-width:280px;width:100%;border-radius:12px;background:#fff;padding:8px"
          onerror="this.outerHTML='<div style=padding:30px;color:var(--red)>❌ Không tải được QR.<br><br>Kiểm tra Cấu hình:<br>• <b>Ngân hàng</b> phải là mã viết tắt (VCB, TCB, MB, BIDV, ACB, VPB, TPB, SHB...)<br>• <b>Số tài khoản</b> đúng định dạng</div>'">
        <div style="margin-top:14px;font-size:13px;color:var(--text2);line-height:1.7">
          <div><strong>${bank}</strong> · ${b}</div>
          <div>${bn}</div>
          <div style="font-size:18px;font-weight:700;color:var(--accent2);margin-top:8px">${fmtMoney(total)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Nội dung: ${desc}</div>
        </div>
      </div>
    </div>`);
}

async function doCheckout() {
  const tableId = currentTableId;
  const ord = orders[tableId]; if (!ord) return;
  const total = calcTotal(ord);
  const tableNum = tableId.replace('t','');

  // CONFIRM Yes/No trước khi thanh toán
  if (!confirm(`Xác nhận thanh toán Bàn ${tableNum}?\n\nTổng tiền: ${fmtMoney(total)}\n\nBàn sẽ được giải phóng sau khi thanh toán.`)) {
    return;
  }

  const { collection, addDoc, doc, deleteDoc, serverTimestamp } = window._firebase;
  await addDoc(collection(window._db,'history'), {
    tableId, tableNum,
    items: ord.items||[], total,
    staffEmail: ord.staffEmail, mergeLog: ord.mergeLog||[],
    closedAt: serverTimestamp(), closedBy: currentUser.email,
    type: 'checkout'
  });
  await logHistory(tableId, `Thanh toán ${fmtMoney(total)}`);
  await deleteDoc(doc(window._db,'orders',tableId));
  closeModal(); closeOP();
  toast(`✅ Thanh toán xong! Bàn ${tableNum} đã trống.`, 'ok');
}
